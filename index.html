<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180" />
  <title>SmashMine</title>
  <style>
    body { background-color: #1a1a2e; margin: 0; overflow: hidden; }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="title-screen">
      <h1 class="game-title">SmashMine</h1>
      <div class="title-buttons">
        <button id="start-btn">TAP TO START</button>
        <button id="shop-btn" class="mission-action-btn secondary">UPGRADES</button>
      </div>
      <div id="version-tag"></div>
    </div>
    <div id="shop-screen" class="overlay hidden">
      <h2>Permanent Upgrades</h2>
      <div id="shop-coins">Coins: <span id="shop-coin-count">0</span></div>
      <div id="shop-list"></div>
      <button id="shop-back-btn" class="mission-action-btn secondary">BACK</button>
    </div>
    <div id="mission-select" class="overlay hidden">
      <h2>Select Mission</h2>
      <div id="mission-list"></div>
      <button id="mission-back-btn" class="mission-action-btn secondary">BACK</button>
    </div>
    <div id="mission-intro" class="overlay hidden">
      <h2 id="mission-title"></h2>
      <p id="mission-goal"></p>
    </div>
    <div id="hud" class="hidden">
      <div id="lifetime-stats"></div>
      <div id="hud-shards">Shards: <span id="shard-count">0/25</span></div>
      <div id="hud-coins">Coins: <span id="coin-count">0</span></div>
      <div id="hud-timer"><span id="timer-display">0:00</span></div>
    </div>
    <div id="tutorial-toast" class="tutorial-toast hidden"></div>
    <div id="smash-btn" class="action-btn hidden">SMASH</div>
    <div id="special-btn" class="action-btn hidden">OP!</div>
    <div id="joystick-zone" class="hidden">
      <div id="joystick-base"></div>
      <div id="joystick-knob"></div>
    </div>
    <div id="reward-screen" class="overlay mission-overlay hidden">
      <h2>MISSION COMPLETE!</h2>
      <div id="loot-summary" class="loot-summary"></div>
      <h3>Choose an Upgrade</h3>
      <div id="upgrade-cards"></div>
      <div class="button-row">
        <button id="home-btn-success" class="mission-action-btn secondary">HOME</button>
        <button id="replay-btn" class="mission-action-btn">PLAY AGAIN</button>
      </div>
    </div>
    <div id="failed-screen" class="overlay mission-overlay hidden">
      <h2>MISSION FAILED</h2>
      <p id="failed-message">Time's up! Try again.</p>
      <div id="failed-loot-summary" class="loot-summary"></div>
      <div class="button-row">
        <button id="home-btn-failed" class="mission-action-btn secondary">HOME</button>
        <button id="retry-btn" class="mission-action-btn">RETRY</button>
      </div>
    </div>
  </div>
  <script type="module" src="src/main.ts"></script>
</body>
</html>
